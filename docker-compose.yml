services:
  postgres:
    image: postgres:17-alpine
    container_name: invenzis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invenzis}
      POSTGRES_USER: ${POSTGRES_USER:-invenzis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invenzis} -d ${POSTGRES_DB:-invenzis}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
