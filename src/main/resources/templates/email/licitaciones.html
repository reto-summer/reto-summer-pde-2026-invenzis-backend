<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
</head>
<body>
<h1 th:if="${#lists.isEmpty(items)}">No hay nuevas licitaciones ARCE para el día <span th:text="${fecha}"></span></h1>
<h1 th:unless="${#lists.isEmpty(items)}"><span th:text="${items.size()}"></span> Licitaciones ARCE del día <span th:text="${fecha}"></span></h1>

    <p th:if="${#lists.isEmpty(items)}">No se encontraron licitaciones para hoy.</p>

    <table th:unless="${#lists.isEmpty(items)}">
        <thead>
            <tr>
                <th>Título</th>
                <th>Descripción</th>
                <th>Fecha publicación</th>
                <th>Enlace</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.titulo}"></td>
                <td th:text="${item.description}"></td>
                <td th:text="${item.fechaPublicacion}"></td>
                <td><a th:href="${item.link}">Ver detalle</a></td>
            </tr>
        </tbody>
    </table>

    <p style="margin-top:24px; font-size:12px; color:#888;">
        Este email fue generado automáticamente por el sistema Invenzis.
    </p>
</body>
</html>
