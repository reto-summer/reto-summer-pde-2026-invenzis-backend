<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
            line-height: 1.6;
        }
        h1 {
            color: #f59e0b;
            font-size: 18px;
            margin-bottom: 20px;
        }
        p {
            color: #555;
        }
        .info-box {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px 16px;
            margin: 20px 0;
            font-size: 13px;
            color: #78350f;
        }
    </style>
</head>
<body>
<h1>Sin licitaciones ARCE para el día <span th:text="${fecha}"></span></h1>

<div class="info-box">
    <p>
        No se encontraron nuevas licitaciones ARCE para hoy. El sistema continúa monitoreando
        y le notificaremos cuando haya nuevas licitaciones disponibles.
    </p>
</div>

<p style="margin-top:24px; font-size:12px; color:#888;">
    Este email fue generado automáticamente por el sistema Invenzis.
</p>
</body>
</html>
