spring.application.name=reto-backend-febrero2026

# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mail recipients (can be comma-separated for multiple recipients)
# Example: user1@example.com,user2@example.com,user3@example.com
mail.to=${MAIL_TO}

# Scheduling
spring.task.scheduling.enabled=true
